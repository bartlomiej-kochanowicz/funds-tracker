version: "3.9"

services:
  development-redis:
    container_name: development-redis
    image: redis:7.0.9-alpine
    ports:
      - "${TESTS_REDIS_PORT}:6379"
    volumes:
      - development-redis:/data

  tests-redis:
    container_name: tests-redis
    image: redis:7.0.9-alpine
    ports:
      - "${DEVELOPMENT_REDIS_PORT}:6379"
    volumes:
      - development-redis:/data

  mailslurper:
    container_name: mailslurper
    image: marcopas/docker-mailslurper
    ports:
      - "2500:2500"
      - "9000:8080"
      - "8085:8085"

  tests-database:
    image: postgres:14.5-alpine
    restart: always
    container_name: tests-database
    ports:
      - "${TESTS_POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_USER=${TESTS_POSTGRES_USER}
      - POSTGRES_PASSWORD=${TESTS_POSTGRES_PASSWORD}
      - POSTGRES_DB=${TESTS_POSTGRES_DB}

  development-database:
    image: postgres:14.5-alpine
    container_name: development-database
    networks:
      - app_network
    environment:
      - POSTGRES_USER=${DEVELOPMENT_POSTGRES_USER}
      - POSTGRES_PASSWORD=${DEVELOPMENT_POSTGRES_PASSWORD}
      - POSTGRES_DB=${DEVELOPMENT_POSTGRES_DB}
    ports:
      - "${DEVELOPMENT_POSTGRES_PORT}:5432"
    volumes:
      - development-database:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-U",
          "${DEVELOPMENT_POSTGRES_USER}",
          "-d",
          "${DEVELOPMENT_POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:9.3.0
    depends_on:
      development-database:
        condition: service_healthy
    ports:
      - 3567:3567
    environment:
      POSTGRESQL_CONNECTION_URI: "postgresql://${DEVELOPMENT_POSTGRES_USER}:${DEVELOPMENT_POSTGRES_PASSWORD}@development-database:5432/${TESTS_POSTGRES_DB}"
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: >
        bash -c 'exec 3<>/dev/tcp/127.0.0.1/3567 && echo -e "GET /hello HTTP/1.1\r\nhost: 127.0.0.1:3567\r\nConnection: close\r\n\r\n" >&3 && cat <&3 | grep "Hello"'
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  development-database:
    driver: local
  development-redis:
    driver: local

networks:
  app_network:
    driver: bridge
